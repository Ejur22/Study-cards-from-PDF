name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    name: Build, test, and package
    runs-on: ubuntu-latest
    services:
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --volume /tmp/minio-data:/data
        command: server /data

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install ruff

      - name: Run Python lint and tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          SECRET_KEY: testkey
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 600
          YANDEX_API_KEY: ${{ secrets.YANDEX_API_KEY }}
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET_NAME: pdf-files
          MINIO_SECURE: False
        run: |
          python -m pytest tests/unit/test_auth_service.py -v

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: |
          cd "frontend/StudyCards App with Registration"
          npm install

      - name: Build frontend
        run: |
          cd "frontend/StudyCards App with Registration"
          npm run build

      - name: Build Docker images
        run: docker compose -f docker-compose.yml build

