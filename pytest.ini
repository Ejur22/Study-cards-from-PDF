[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: быстрые unit тесты
    integration: интеграционные тесты с БД
    e2e: сквозные тесты через UI
    slow: медленные тесты
    auth: тесты аутентификации
    file: тесты работы с файлами
    api: тесты интеграции с внешними API
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
